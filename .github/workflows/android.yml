name: Android CI

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Force Clean Build
        run: |
          # 1. Удаляем все кэши Gradle, которые могли остаться от прошлых попыток
          rm -rf ~/.gradle/caches
          # 2. Скачиваем проверенную версию 8.5
          wget -q https://services.gradle.org/distributions/gradle-8.5-bin.zip
          unzip -q gradle-8.5-bin.zip
          # 3. Добавляем ее в PATH, чтобы она была ПЕРВОЙ в списке
          export PATH=$PWD/gradle-8.5/bin:$PATH
          # 4. Проверяем версию
          gradle --version
          # 5. Запускаем сборку
          gradle assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: |
            **/build/outputs/apk/debug/*.apk
