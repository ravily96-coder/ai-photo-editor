name: Android CI

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build with Fixed Gradle 8.7
        run: |
          # 1. Удаляем любые попытки запуска wrapper'а
          rm -f gradlew
          # 2. Скачиваем конкретную версию 8.7
          wget -q https://services.gradle.org/distributions/gradle-8.7-bin.zip
          unzip -q gradle-8.7-bin.zip
          # 3. Добавляем ее в PATH
          export PATH=$PWD/gradle-8.7/bin:$PATH
          # 4. Проверяем версию
          gradle --version
          # 5. Запускаем сборку
          gradle assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: |
            **/build/outputs/apk/debug/*.apk
